<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CCC mark, monochrome for dark backgrounds">
  <title>CCC mark, mono light</title>
  <desc>Single-color mark for dark backgrounds. Three calm sessions are outlined; the one that needs you is filled. Transparent background.</desc>
  <!-- One ink color: #e6ebf2. Place on any dark surface. -->
  <g fill="none" stroke="#e6ebf2">
    <!-- board frame -->
    <rect x="10" y="10" width="492" height="492" rx="110" stroke-width="10"/>
    <!-- calm sessions: outlined -->
    <rect x="96"  y="96"  width="144" height="144" rx="30" stroke-width="16"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" stroke-width="16"/>
    <rect x="272" y="272" width="144" height="144" rx="30" stroke-width="16"/>
  </g>
  <!-- the one that needs you: filled -->
  <rect x="272" y="96" width="144" height="144" rx="30" fill="#e6ebf2"/>
</svg>
