<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="CCC — Start the next while Claude builds the first. ccc.amirfish.ai">
  <title>CCC LinkedIn banner</title>
  <desc>LinkedIn personal profile banner, 1584 by 396. Content kept clear of the bottom-left profile-photo zone.</desc>
  <rect width="1584" height="396" fill="#0d1117"/>

  <!-- Board mark (scaled from the 512 master) -->
  <g transform="translate(210 123) scale(0.293)">
    <rect x="2" y="2" width="508" height="508" rx="114" fill="#161b22" stroke="#30363d" stroke-width="4"/>
    <rect x="96"  y="96"  width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="96"  width="144" height="144" rx="30" fill="#f5a623"/>
    <circle cx="386" cy="126" r="15" fill="#0d1117"/>
  </g>

  <!-- Wordmark CCC -->
  <g transform="translate(398 141) scale(0.63)">
    <g fill="none" stroke-width="40" stroke-linecap="round">
      <path d="M 123.25 47.45 A 54 54 0 1 0 123.25 132.55" stroke="#6e8caf"/>
      <path d="M 283.25 47.45 A 54 54 0 1 0 283.25 132.55" stroke="#f5a623"/>
      <path d="M 443.25 47.45 A 54 54 0 1 0 443.25 132.55" stroke="#6e8caf"/>
    </g>
  </g>

  <!-- Divider with amber accent -->
  <rect x="726" y="118" width="2" height="160" fill="#30363d"/>
  <rect x="726" y="118" width="2" height="40"  fill="#f5a623"/>

  <!-- Tagline -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800">
    <text x="770" y="178" font-size="46" fill="#e6ebf2">Start <tspan fill="#f5a623">the next</tspan></text>
    <text x="770" y="234" font-size="46" fill="#e6ebf2">while Claude builds the first.</text>
  </g>
  <text x="770" y="290"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="24" fill="#8b949e">ccc.amirfish.ai</text>
</svg>
