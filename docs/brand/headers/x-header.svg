<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="CCC — Start the next while Claude builds the first. ccc.amirfish.ai">
  <title>CCC X header</title>
  <desc>X (Twitter) header, 1500 by 500. Key content centered and kept above the bottom profile zone.</desc>
  <rect width="1500" height="500" fill="#0d1117"/>

  <!-- URL, top-right (stays clear of the bottom avatar/profile overlay) -->
  <text x="1452" y="58" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="24" fill="#8b949e">ccc.amirfish.ai</text>

  <!-- Board mark, centered near top -->
  <g transform="translate(680 62) scale(0.273)">
    <rect x="2" y="2" width="508" height="508" rx="114" fill="#161b22" stroke="#30363d" stroke-width="4"/>
    <rect x="96"  y="96"  width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="96"  width="144" height="144" rx="30" fill="#f5a623"/>
    <circle cx="386" cy="126" r="15" fill="#0d1117"/>
  </g>

  <!-- Wordmark CCC, centered -->
  <g transform="translate(616 226) scale(0.56)">
    <g fill="none" stroke-width="40" stroke-linecap="round">
      <path d="M 123.25 47.45 A 54 54 0 1 0 123.25 132.55" stroke="#6e8caf"/>
      <path d="M 283.25 47.45 A 54 54 0 1 0 283.25 132.55" stroke="#f5a623"/>
      <path d="M 443.25 47.45 A 54 54 0 1 0 443.25 132.55" stroke="#6e8caf"/>
    </g>
  </g>

  <!-- Tagline, centered -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
     font-weight="800" text-anchor="middle">
    <text x="750" y="388" font-size="40" fill="#e6ebf2">Start <tspan fill="#f5a623">the next</tspan> while Claude builds the first.</text>
  </g>
  <rect x="710" y="410" width="80" height="4" rx="2" fill="#f5a623"/>
</svg>
