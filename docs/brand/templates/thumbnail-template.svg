<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="CCC YouTube thumbnail template">
  <title>CCC thumbnail template</title>
  <desc>The reusable 1280x720 YouTube thumbnail system: a bold 3-5 word pain phrase on the left, a real UI screenshot slot on the right, a feature-name label, and a CCC mark corner badge. Two filled examples ship alongside: thumbnail-example-attention.svg and thumbnail-example-board.svg.</desc>

  <!-- ==========================================================================
       THUMBNAIL RULES
       - Pain phrase: 3 to 5 words. The reader's moment, not the feature.
         One key word in amber (#f5a623). Rest in #e6ebf2. Font >= 78px so it
         survives the small grid thumbnail.
       - Feature name: the real feature, from pain-feature-proof.md. Slate pill.
       - Screenshot slot: a REAL UI capture only. Dark theme. Rounded 16px,
         1px #30363d border, soft shadow, equal inset. Never a fabricated UI
         or invented numbers presented as product.
       - Badge: CCC mark, bottom-right, ~72px.
       - Margins: 64px. Keep faces/text out of the outer 48px (player chrome).
       ========================================================================== -->

  <defs>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#0d1117"/>

  <!-- Margin + split guides (template only; delete when filling) -->
  <g fill="none" stroke="#30363d" stroke-dasharray="6 8" opacity="0.55">
    <rect x="64" y="64" width="1152" height="592" rx="4"/>
    <line x1="700" y1="64" x2="700" y2="656"/>
  </g>

  <!-- Left: pain phrase zone -->
  <text x="64" y="150"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="24" letter-spacing="3" fill="#f5a623">PAIN PHRASE — 3 TO 5 WORDS</text>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
     font-weight="800" font-size="96" fill="#e6ebf2">
    <text x="60" y="290">The reader's</text>
    <text x="60" y="392"><tspan fill="#f5a623">moment</tspan></text>
    <text x="60" y="494">of pain.</text>
  </g>

  <!-- Feature-name pill -->
  <g>
    <rect x="64" y="548" width="360" height="60" rx="30" fill="#161b22" stroke="#30363d"/>
    <circle cx="98" cy="578" r="8" fill="#6e8caf"/>
    <text x="120" y="588"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-weight="600" font-size="26" fill="#c9d1d9">Real feature name</text>
  </g>

  <!-- Right: real-UI screenshot slot -->
  <g filter="url(#shadow)">
    <rect x="724" y="150" width="492" height="430" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  </g>
  <g fill="none" stroke="#30363d" stroke-dasharray="6 8" opacity="0.7">
    <rect x="748" y="174" width="444" height="382" rx="8"/>
  </g>
  <text x="970" y="360" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="22" fill="#8b949e">REAL UI CAPTURE</text>
  <text x="970" y="392" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="16" fill="#57606a">dark theme · rounded 16 · 1px border · soft shadow</text>

  <!-- CCC mark corner badge, bottom-right -->
  <g transform="translate(1132 584) scale(0.14)">
    <rect x="2" y="2" width="508" height="508" rx="114" fill="#161b22" stroke="#30363d" stroke-width="6"/>
    <rect x="96"  y="96"  width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="96"  width="144" height="144" rx="30" fill="#f5a623"/>
  </g>
</svg>
