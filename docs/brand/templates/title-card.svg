<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="CCC: the coding-agent command center. Start the next while Claude builds the first. ccc.amirfish.ai">
  <title>CCC video title card</title>
  <desc>1920x1080 title card for videos. Centered lockup, tagline, descriptor, and URL on the brand near-black background.</desc>

  <rect width="1920" height="1080" fill="#0d1117"/>

  <!-- Faint board texture in the corners -->
  <g fill="#6e8caf" opacity="0.07">
    <rect x="120" y="120" width="110" height="110" rx="22"/>
    <rect x="248" y="120" width="110" height="110" rx="22"/>
    <rect x="120" y="248" width="110" height="110" rx="22"/>
    <rect x="1562" y="850" width="110" height="110" rx="22"/>
    <rect x="1690" y="850" width="110" height="110" rx="22"/>
    <rect x="1690" y="722" width="110" height="110" rx="22"/>
  </g>

  <!-- Lockup: board mark + wordmark, centered -->
  <g transform="translate(682 290) scale(0.352)">
    <rect x="2" y="2" width="508" height="508" rx="114" fill="#161b22" stroke="#30363d" stroke-width="4"/>
    <rect x="96"  y="96"  width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="96"  width="144" height="144" rx="30" fill="#f5a623"/>
    <circle cx="386" cy="126" r="15" fill="#0d1117"/>
  </g>
  <g transform="translate(890 313) scale(0.75)">
    <g fill="none" stroke-width="40" stroke-linecap="round">
      <path d="M 123.25 47.45 A 54 54 0 1 0 123.25 132.55" stroke="#6e8caf"/>
      <path d="M 283.25 47.45 A 54 54 0 1 0 283.25 132.55" stroke="#f5a623"/>
      <path d="M 443.25 47.45 A 54 54 0 1 0 443.25 132.55" stroke="#6e8caf"/>
    </g>
  </g>

  <!-- Descriptor -->
  <text x="960" y="548" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="600" font-size="30" letter-spacing="7" fill="#8b949e">THE CODING-AGENT COMMAND CENTER</text>

  <!-- Tagline -->
  <text x="960" y="686" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="800" font-size="66" fill="#e6ebf2">Start <tspan fill="#f5a623">the next</tspan> while Claude builds the first.</text>

  <!-- URL -->
  <text x="960" y="928" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="30" fill="#8b949e">ccc.amirfish.ai</text>
</svg>
