<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Thumbnail example: It's been waiting an hour. Attention detection.">
  <title>CCC thumbnail example — Attention detection</title>
  <desc>Filled thumbnail example. Pain phrase "It's been waiting an hour." Real feature: Attention detection. The right slot is a placeholder frame; production drops a real UI capture in it.</desc>

  <defs>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#0d1117"/>

  <!-- Pain phrase -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
     font-weight="800" font-size="100" fill="#e6ebf2">
    <text x="60" y="248">It's been</text>
    <text x="60" y="360"><tspan fill="#f5a623">waiting</tspan></text>
    <text x="60" y="472">an hour.</text>
  </g>

  <!-- Feature pill -->
  <g>
    <rect x="64" y="536" width="356" height="60" rx="30" fill="#161b22" stroke="#30363d"/>
    <circle cx="98" cy="566" r="8" fill="#f5a623"/>
    <text x="120" y="576"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-weight="600" font-size="26" fill="#c9d1d9">Attention detection</text>
  </g>

  <!-- Screenshot slot: framed placeholder (drop a real capture here) -->
  <g filter="url(#shadow)">
    <rect x="724" y="150" width="492" height="430" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  </g>
  <!-- title bar -->
  <rect x="724" y="150" width="492" height="40" rx="16" fill="#161b22"/>
  <rect x="724" y="176" width="492" height="14" fill="#161b22"/>
  <circle cx="748" cy="170" r="5" fill="#30363d"/>
  <circle cx="766" cy="170" r="5" fill="#30363d"/>
  <circle cx="784" cy="170" r="5" fill="#30363d"/>
  <!-- schematic session rows; one flagged for attention -->
  <g>
    <rect x="748" y="214" width="444" height="46" rx="8" fill="#161b22"/>
    <circle cx="772" cy="237" r="7" fill="#6e8caf"/>
    <rect x="792" y="230" width="230" height="12" rx="6" fill="#30363d"/>

    <rect x="748" y="272" width="444" height="46" rx="8" fill="#21262d" stroke="#f5a623" stroke-width="2"/>
    <circle cx="772" cy="295" r="7" fill="#f5a623"/>
    <rect x="792" y="288" width="270" height="12" rx="6" fill="#8b949e"/>
    <rect x="1150" y="286" width="18" height="18" rx="9" fill="#f5a623"/>

    <rect x="748" y="330" width="444" height="46" rx="8" fill="#161b22"/>
    <circle cx="772" cy="353" r="7" fill="#6e8caf"/>
    <rect x="792" y="346" width="200" height="12" rx="6" fill="#30363d"/>

    <rect x="748" y="388" width="444" height="46" rx="8" fill="#161b22"/>
    <circle cx="772" cy="411" r="7" fill="#6e8caf"/>
    <rect x="792" y="404" width="250" height="12" rx="6" fill="#30363d"/>

    <rect x="748" y="446" width="444" height="46" rx="8" fill="#161b22"/>
    <circle cx="772" cy="469" r="7" fill="#3fb950"/>
    <rect x="792" y="462" width="180" height="12" rx="6" fill="#30363d"/>
  </g>
  <text x="970" y="548" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="14" fill="#57606a">placeholder — drop a real capture here</text>

  <!-- CCC mark badge -->
  <g transform="translate(1132 584) scale(0.14)">
    <rect x="2" y="2" width="508" height="508" rx="114" fill="#161b22" stroke="#30363d" stroke-width="6"/>
    <rect x="96"  y="96"  width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="96"  y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="272" width="144" height="144" rx="30" fill="#6e8caf"/>
    <rect x="272" y="96"  width="144" height="144" rx="30" fill="#f5a623"/>
  </g>
</svg>
