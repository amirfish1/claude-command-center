name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN is required when using remote-organization-name
          # / remote-repository-name (as we do here to store signatures in the
          # cla-signatures branch). Create a classic PAT with `contents: write`
          # (repo scope) on a maintainer account and add it as a repository secret
          # named PERSONAL_ACCESS_TOKEN. See the contributor-assistant action
          # README for details on writing signatures to a remote repo/org.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/amirfish1/claude-command-center/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: amirfish1,dependabot[bot]
          remote-organization-name: amirfish1
          remote-repository-name: claude-command-center
          create-file-commit-message: 'chore(cla): create signatures file'
          signed-commit-message: 'chore(cla): @$contributorName signed CLA'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge, please read and sign the [Contributor License Agreement](https://github.com/amirfish1/claude-command-center/blob/main/CLA.md). Comment with the exact sentence below to sign:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
