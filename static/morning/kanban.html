<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CCC · Morning Kanban</title>
  <link rel="stylesheet" href="/static/morning/morning.css">
  <link rel="stylesheet" href="/static/morning/kanban.css">
</head>
<body>
  <div class="mk-wrap" id="mk-wrap">
    <nav class="mv-nav">
      <a href="/morning">Morning</a>
      <a class="active">Kanban</a>
      <a href="/">Dev Kanban</a>
      <span class="mv-nav-meta" id="refresh-meta">loading…</span>
      <button id="refresh-now" title="reload">Refresh</button>
    </nav>

    <section class="mk-hero">
      <h1 id="mk-greeting">Good morning.</h1>
      <p id="mk-subgreeting" class="mk-subgreeting">What's on your mind?</p>
      <textarea id="mk-dump" rows="6" placeholder="Dump everything — multiple lines, one thought per line. I'll figure out what's new, what matches existing work, and what's just context."></textarea>
      <div class="mk-hero-actions">
        <button id="mk-analyze" class="primary">Analyze →</button>
        <span id="mk-analyze-status" class="muted"></span>
      </div>
      <div id="mk-analysis" class="mk-analysis" hidden></div>
    </section>

    <section class="mk-today" id="mk-today-section" hidden>
      <h3>Today <span id="mk-today-count" class="mk-count"></span></h3>
      <div id="mk-today-list"></div>
    </section>

    <div class="mk-board-toggle">
      <button id="mk-board-toggle" type="button">▸ Show sessions (<span id="mk-board-count">loading</span>)</button>
    </div>

    <div class="mk-board" id="mk-board" hidden>
      <section class="mk-col" data-col="backlog">
        <h3>Backlog <span class="mk-count" id="count-backlog"></span></h3>
        <p class="subtitle">Strategies from every goal that don't have a session yet.</p>
        <div class="mk-list" id="col-backlog"></div>
      </section>
      <section class="mk-col" data-col="active">
        <h3>Active <span class="mk-count" id="count-active"></span></h3>
        <p class="subtitle">Sessions with a running process right now.</p>
        <div class="mk-list" id="col-active"></div>
      </section>
      <section class="mk-col" data-col="dormant">
        <h3>Dormant <span class="mk-count" id="count-dormant"></span></h3>
        <p class="subtitle">Sessions that exist on disk but no process attached.</p>
        <div class="mk-list" id="col-dormant"></div>
      </section>
    </div>
  </div>

  <aside id="mk-pane" class="mk-pane" hidden>
    <div class="mk-pane-header">
      <div class="mk-pane-title" id="mk-pane-title">—</div>
      <button class="mk-pane-close" id="mk-pane-close" title="close">×</button>
    </div>
    <div class="mk-pane-meta" id="mk-pane-meta"></div>
    <div class="mk-pane-transcript" id="mk-pane-transcript">
      <div class="mk-empty">No transcript yet.</div>
    </div>
    <div class="mk-pane-input">
      <textarea id="mk-pane-msg" placeholder="Type a message to inject into this session…" rows="3"></textarea>
      <button id="mk-pane-send" class="primary">Send</button>
    </div>
  </aside>

  <script src="/static/morning/side-nav.js"></script>
  <script src="/static/morning/kanban.js"></script>
</body>
</html>
