  async function pollWatcher() {
    try {
      const res = await fetch('/api/watcher');
      const data = await res.json();
      updateWatcherUI(data);
    } catch {}
  }

  function updateWatcherUI(data) {
    const running = data.running;
    const zombies = data.zombies || [];
    $watcherDot.className = 'watcher-dot' + (running ? ' running' : '');
    $watcherBtn.disabled = false;
    if (running) {
      $watcherBtn.textContent = 'Stop Watcher';
      $watcherBtn.className = 'watcher-btn stop';
      if (!watcherPolling) watcherPolling = setInterval(pollWatcher, 3000);
    } else {
      $watcherBtn.textContent = 'Start Watcher';
      $watcherBtn.className = 'watcher-btn start';
      if (watcherPolling) { clearInterval(watcherPolling); watcherPolling = null; }
    }
    let outputLines = (data.output || []).slice();
    if (zombies.length && !running) {
      outputLines.unshift('Warning: Orphan watcher PIDs: ' + zombies.join(', ') + ' (will be killed on next start)');
    }
    if (outputLines.length) {
      $watcherOutput.textContent = outputLines.join('\n');
      $watcherOutput.scrollTop = $watcherOutput.scrollHeight;
    }
  }

  $watcherBtn.addEventListener('click', async () => {
    const running = $watcherDot.classList.contains('running');
    $watcherBtn.disabled = true;
    $watcherBtn.textContent = running ? 'Stopping...' : 'Starting...';
    try {
      const res = await fetch(running ? '/api/watcher/stop' : '/api/watcher/start', { method: 'POST' });
      const data = await res.json();
      if (data.error && !data.running) {
        $watcherOutput.textContent = data.error;

  // ── Sidebar resizer ──
  const $sidebar = document.querySelector('.sidebar');
  const $resizer = document.getElementById('sidebarResizer');
  if ($sidebar && $resizer) {
    const saved = parseInt(localStorage.getItem('clv-sidebar-width') || '0', 10);
    if (saved >= 240 && saved <= window.innerWidth * 0.6) {
      $sidebar.style.width = saved + 'px';
    }
    let startX = 0, startWidth = 0;
    $resizer.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startX = e.clientX;
      startWidth = $sidebar.getBoundingClientRect().width;
      $resizer.classList.add('dragging');
      document.body.classList.add('resizing');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      const w = Math.max(240, Math.min(window.innerWidth * 0.6, startWidth + (e.clientX - startX)));
      $sidebar.style.width = w + 'px';
    }
    function onUp() {
      $resizer.classList.remove('dragging');
      document.body.classList.remove('resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      const w = parseInt($sidebar.style.width, 10);

  // ── New-session modal ──
  const $nsm = document.getElementById('newSessionModal');

  const $nsmPkood = document.getElementById('nsmPkood');
  function openNewSessionModal(seed = '') {
    if (!$nsm) return;
    $nsmSubject.value = seed || '';
    $nsmBody.value = '';
    if ($nsmPkood && $kptPkoodToggle) $nsmPkood.checked = $kptPkoodToggle.checked;

  async function submitNewSessionModal() {
    const subject = ($nsmSubject.value || '').trim();
    const body = ($nsmBody.value || '').trim();
    if (!subject && !body) return;
    const effectiveSubject = subject || body.slice(0, 60);
    const prompt = body ? (subject ? (subject + '\n\n' + body) : body) : subject;
    const usePkood = !!($nsmPkood && $nsmPkood.checked);

    $nsmSubmit.textContent = 'Launching...';

      const endpoint = usePkood ? '/api/pkood/spawn' : '/api/sessions/spawn';
      const res = await fetch(endpoint, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ prompt, name: effectiveSubject }),

      const data = await res.json();
      if (data.ok) {
        closeNewSessionModal();

            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text }),
          });

  // Apply initial font scale to split view
  if ($convPanelView) $convPanelView.style.zoom = convFontScale;

  // Auto-refresh session data every 10s — keeps kanban columns, signals,
  // and relative times up to date without manual refresh.
  setInterval(async () => {
    if (activeTab !== 'sessions') return;
    try {
      const res = await fetch('/api/sessions');
      const fresh = await res.json();
      // Preserve user-set fields from cached data (display_name overrides, etc.)
      const oldBySessionId = {};
      for (const c of conversationsData) oldBySessionId[c.session_id] = c;
      for (const c of fresh) {
        const old = oldBySessionId[c.session_id];
        if (old && old.name_overridden && !c.name_overridden) {
          c.display_name = old.display_name;
          c.name_overridden = true;
        }
      }
      conversationsData = fresh;
      // Re-cache session IDs/cwds for Resume/Jump
      sessionIdByConv = {};
      sessionCwdByConv = {};
      sessionCwdExistsByConv = {};
      for (const c of conversationsData) {
        if (c.session_id) sessionIdByConv[c.id] = c.session_id;
        if (c.session_cwd) sessionCwdByConv[c.id] = c.session_cwd;
        sessionCwdExistsByConv[c.id] = !!c.session_cwd_exists;
      }
      renderSidebar(filterConversations($convSearch.value));
    } catch (_) {}
  }, 10000);

  // --- Spawn new session ---
  async function spawnNewSession() {
    let prompt = ($newSessionInput && $newSessionInput.value || '').trim();
    if (!prompt) return;
    const usePkood = ($pkoodToggle && $pkoodToggle.checked) || prompt.startsWith('pkood:');
    if (prompt.startsWith('pkood:')) prompt = prompt.slice(6).trim();
    if (!prompt) return;
    $newSessionBtn.disabled = true;
    $newSessionBtn.textContent = 'Spawning...';
    try {
      const endpoint = usePkood ? '/api/pkood/spawn' : '/api/sessions/spawn';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ prompt }),
      });
      const data = await res.json();
      if (data.ok) {
        $newSessionInput.value = '';
        $newSessionBtn.textContent = 'Spawned!';
        setTimeout(refreshConversationList, 3000);
      } else {
        $newSessionBtn.textContent = data.error ? 'Failed: ' + data.error.slice(0, 30) : 'Failed';
      }
    } catch (err) {
      $newSessionBtn.textContent = 'Error';
    }
    setTimeout(() => {
      $newSessionBtn.disabled = false;
      $newSessionBtn.textContent = 'Run';
    }, 2000);
  }
  if ($newSessionBtn) $newSessionBtn.addEventListener('click', spawnNewSession);
  if ($newSessionInput) $newSessionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); spawnNewSession(); }
  });

  // Init — default to Sessions tab
  loadConversationList();
  // Hide sidebar sections that don't apply to Sessions
  if ($watcherPanel) $watcherPanel.style.display = 'none';
  // Lazy-load the issues tab data
  loadIssues();
  startIssuesPolling();
  pollWatcher();
  pollVercelDeploy();
  setInterval(pollVercelDeploy, 15000);
})();
</script>
</body>
</html>
